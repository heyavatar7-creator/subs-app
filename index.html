<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Мои подписки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --bg:      var(--tg-theme-bg-color, #1c1c1e);
      --card-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
      --text:    var(--tg-theme-text-color, #ffffff);
      --hint:    var(--tg-theme-hint-color, rgba(255,255,255,0.5));
      --accent:  var(--tg-theme-button-color, #5865f2);
      --danger:  #ef4444;
      --radius:  16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 32px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 20;
      padding: 20px 16px 14px;
      background: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
    .badge { margin-top: 5px; font-size: 13px; color: var(--hint); }
    .refresh-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.07); border: none;
      color: var(--hint); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .refresh-btn:active { background: rgba(255,255,255,0.13); }
    .refresh-btn.spinning { animation: spin 0.7s linear infinite; }

    /* ── States ── */
    .state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 32px; gap: 10px; text-align: center;
    }
    .state-icon  { font-size: 54px; }
    .state-title { font-size: 18px; font-weight: 600; }
    .state-hint  { font-size: 14px; color: var(--hint); line-height: 1.55; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    /* ── List ── */
    .list { padding: 14px 16px 0; display: flex; flex-direction: column; gap: 12px; }

    /* ── Card ── */
    .card {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 16px; position: relative; overflow: hidden;
      border: 1px solid transparent;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }
    .card.urgent {
      border-color: rgba(239,68,68,0.3);
      box-shadow: 0 0 0 1px rgba(239,68,68,0.1) inset, 0 6px 24px rgba(239,68,68,0.1);
    }
    .card.removing {
      transform: translateX(-110%); opacity: 0;
      pointer-events: none; margin-bottom: -88px;
    }
    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 14px; gap: 8px;
    }
    .card-info { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .svc-icon {
      width: 42px; height: 42px; border-radius: 11px;
      background: rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      font-size: 23px; flex-shrink: 0;
    }
    .svc-name {
      font-size: 16px; font-weight: 600; line-height: 1.25;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .svc-cost { font-size: 13px; color: var(--hint); margin-top: 2px; }

    /* Card action buttons */
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .icon-btn {
      width: 28px; height: 28px; border-radius: 50%;
      border: none; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .icon-btn:active { transform: scale(0.88); }
    .edit-btn  { background: rgba(88,101,242,0.15); color: rgba(88,101,242,0.9); }
    .edit-btn:hover  { background: rgba(88,101,242,0.28); }
    .del-btn   { background: rgba(239,68,68,0.1);  color: rgba(239,68,68,0.65); }
    .del-btn:hover   { background: rgba(239,68,68,0.2); color: var(--danger); }

    /* Progress */
    .progress-track {
      height: 7px; background: rgba(255,255,255,0.07);
      border-radius: 999px; overflow: hidden; margin-bottom: 9px;
    }
    .progress-fill {
      height: 100%; border-radius: 999px; width: 0;
      transition: width 0.85s cubic-bezier(0.4,0,0.2,1);
    }
    .progress-fill.ok     { background: linear-gradient(90deg, #16a34a, #22c55e); }
    .progress-fill.warn   { background: linear-gradient(90deg, #d97706, #f59e0b); }
    .progress-fill.danger {
      background: linear-gradient(90deg, #dc2626, #ef4444);
      animation: dangerPulse 2s ease-in-out infinite;
    }
    @keyframes dangerPulse { 0%,100% { opacity:1; } 50% { opacity:.7; } }

    .card-footer {
      display: flex; justify-content: space-between;
      align-items: center; font-size: 12px; color: var(--hint);
    }
    .days-left.urgent { color: var(--danger); font-weight: 600; }

    /* ── Delete confirm overlay (per card) ── */
    .confirm-overlay {
      position: absolute; inset: 0; background: var(--card-bg);
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .confirm-overlay.show { opacity: 1; pointer-events: all; }
    .confirm-text { font-size: 15px; font-weight: 500; text-align: center; }
    .confirm-btns { display: flex; gap: 8px; width: 100%; }
    .btn {
      flex: 1; padding: 11px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active   { opacity: .75; transform: scale(.97); }
    .btn:disabled { opacity: .5; pointer-events: none; }
    .btn-cancel   { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-confirm  { background: var(--danger); color: #fff; }
    .btn-save     { background: var(--accent); color: #fff; }

    /* ── Edit modal (bottom sheet) ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: all; }

    .modal-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
      background: var(--card-bg);
      border-radius: 20px 20px 0 0;
      padding: 12px 20px 32px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .modal-sheet.show { transform: translateY(0); }

    .modal-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px; margin: 0 auto 18px;
    }
    .modal-title {
      font-size: 17px; font-weight: 700;
      text-align: center; margin-bottom: 20px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 12px; color: var(--hint);
      margin-bottom: 6px; font-weight: 500;
    }
    .field input, .field select {
      width: 100%; padding: 12px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; color: var(--text);
      font-size: 15px; font-family: inherit;
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
    }
    .field select option { background: #2c2c2e; }
    .field-row { display: flex; gap: 10px; }
    .field-row .field { flex: 1; }
    .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📋 Мои подписки</h1>
    <div id="badge" class="badge hidden"></div>
  </div>
  <button id="refreshBtn" class="refresh-btn" title="Обновить">↻</button>
</div>

<div id="loading" class="state">
  <div class="spinner"></div>
  <p class="state-hint">Загружаю...</p>
</div>
<div id="empty" class="state hidden">
  <div class="state-icon">📭</div>
  <p class="state-title">Подписок пока нет</p>
  <p class="state-hint">Напишите боту название сервиса,<br>стоимость и дату оформления</p>
</div>
<div id="error" class="state hidden">
  <div class="state-icon">⚠️</div>
  <p class="state-title">Ошибка загрузки</p>
  <p id="errorMsg" class="state-hint"></p>
</div>
<div id="list" class="list hidden"></div>

<!-- Edit bottom sheet -->
<div id="modalBackdrop" class="modal-backdrop"></div>
<div id="modalSheet" class="modal-sheet">
  <div class="modal-handle"></div>
  <div class="modal-title">✏️ Редактировать подписку</div>

  <div class="field">
    <label>Название</label>
    <input id="editName" type="text" placeholder="Spotify" />
  </div>
  <div class="field-row">
    <div class="field">
      <label>Стоимость</label>
      <input id="editCost" type="number" placeholder="299" />
    </div>
    <div class="field">
      <label>Валюта</label>
      <select id="editCurrency">
        <option value="RUB">₽ RUB</option>
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label>Дата начала</label>
    <input id="editDate" type="date" />
  </div>
  <div class="field">
    <label>Период</label>
    <select id="editPeriod">
      <option value="30">Ежемесячно (30 дн.)</option>
      <option value="90">Каждые 3 месяца</option>
      <option value="180">Каждые 6 месяцев</option>
      <option value="365">Ежегодно (365 дн.)</option>
    </select>
  </div>

  <div class="modal-actions">
    <button class="btn btn-cancel" id="editCancel">Отмена</button>
    <button class="btn btn-save"   id="editSave">Сохранить</button>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://gzsbodvyalwvfmzgwggf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6c2JvZHZ5YWx3dmZtemd3Z2dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjM4MzcsImV4cCI6MjA5MzM5OTgzN30.7dSJEQpWh2S1muvaAs2mFS70SARnuG4sE8ucsfNGpM0';

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const userId = tg?.initDataUnsafe?.user?.id ?? null;

const HDR = {
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type': 'application/json',
};

const EMOJI = {
  spotify:'🎵',netflix:'🎬',youtube:'▶️',amazon:'📦',apple:'🍎',
  icloud:'☁️',adobe:'🎨',figma:'✏️',яндекс:'🟡',yandex:'🟡',vk:'💙',
  telegram:'✈️',github:'💻',notion:'📝',slack:'💬',zoom:'📹',
  discord:'🎮',chatgpt:'🤖',openai:'🤖',claude:'🧠',midjourney:'🖼️',
  google:'🔍',dropbox:'📦',canva:'🎨',office:'📊',microsoft:'💼',
  linkedin:'💼',twitter:'🐦',instagram:'📸',tiktok:'🎶',vps:'🖥️',ufo:'🖥️',
};
const getEmoji = n => {
  const l = n.toLowerCase();
  return Object.entries(EMOJI).find(([k]) => l.includes(k))?.[1] ?? '💳';
};

function calcStatus(startDate, period) {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(startDate + 'T00:00:00'); start.setHours(0,0,0,0);
  const daysSince = Math.floor((today - start) / 86400000);
  if (daysSince < 0) return { elapsed:0, remaining:period, progress:0, renewal:start };
  const elapsed   = daysSince % period;
  const remaining = period - elapsed;
  const renewal   = new Date(today); renewal.setDate(today.getDate() + remaining);
  return { elapsed, remaining, progress: elapsed/period*100, renewal };
}
const colorCls = r => r <= 5 ? 'danger' : r <= 10 ? 'warn' : 'ok';
const fmtDate  = d => d.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
const fmtCost  = (c, cur) => `${Number(c).toLocaleString('ru-RU')} ${{RUB:'₽',USD:'$',EUR:'€',UAH:'₴'}[cur]??cur}`;
const fmtPer   = d => d >= 360 ? '/год' : d >= 28 ? '/мес' : `/${d}дн.`;
const plurDays = n => {
  const m=n%10, h=n%100;
  if(h>=11&&h<=19) return `${n} дней`;
  if(m===1) return `${n} день`;
  if(m>=2&&m<=4) return `${n} дня`;
  return `${n} дней`;
};

// ── Edit modal ──────────────────────────────────────────────
let _editId = null;
let _editCard = null;

function openEdit(sub, card) {
  _editId   = sub.id;
  _editCard = card;
  document.getElementById('editName').value    = sub.service_name;
  document.getElementById('editCost').value    = sub.cost;
  document.getElementById('editCurrency').value= sub.currency || 'RUB';
  document.getElementById('editDate').value    = sub.start_date;
  document.getElementById('editPeriod').value  = String(sub.billing_period_days || 30);
  document.getElementById('modalBackdrop').classList.add('show');
  document.getElementById('modalSheet').classList.add('show');
  document.getElementById('editName').focus();
}

function closeEdit() {
  document.getElementById('modalBackdrop').classList.remove('show');
  document.getElementById('modalSheet').classList.remove('show');
  _editId = null; _editCard = null;
}

document.getElementById('editCancel').addEventListener('click', closeEdit);
document.getElementById('modalBackdrop').addEventListener('click', closeEdit);

document.getElementById('editSave').addEventListener('click', async () => {
  if (!_editId) return;
  const btn = document.getElementById('editSave');
  btn.disabled = true; btn.textContent = '...';

  const updates = {
    service_name:       document.getElementById('editName').value.trim(),
    cost:               parseFloat(document.getElementById('editCost').value),
    currency:           document.getElementById('editCurrency').value,
    start_date:         document.getElementById('editDate').value,
    billing_period_days: parseInt(document.getElementById('editPeriod').value),
  };

  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/subscriptions?id=eq.${_editId}`, {
      method: 'PATCH',
      headers: { ...HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify(updates),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    closeEdit();
    await load(); // refresh list
  } catch(e) {
    btn.textContent = 'Ошибка!';
    setTimeout(() => { btn.disabled=false; btn.textContent='Сохранить'; }, 1500);
  }
});

// ── Card builder ────────────────────────────────────────────
function buildCard(sub) {
  const { elapsed, remaining, progress, renewal } = calcStatus(
    sub.start_date, sub.billing_period_days || 30
  );
  const urgent = remaining <= 5;
  const card   = document.createElement('div');
  card.className = `card${urgent ? ' urgent' : ''}`;
  card.dataset.id = sub.id;

  card.innerHTML = `
    <div class="card-top">
      <div class="card-info">
        <div class="svc-icon">${getEmoji(sub.service_name)}</div>
        <div style="min-width:0">
          <div class="svc-name">${sub.service_name}</div>
          <div class="svc-cost">${fmtCost(sub.cost, sub.currency||'RUB')}${fmtPer(sub.billing_period_days||30)}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="icon-btn edit-btn" title="Редактировать">✏️</button>
        <button class="icon-btn del-btn"  title="Удалить">✕</button>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill ${colorCls(remaining)}" data-w="${progress.toFixed(2)}"></div>
    </div>
    <div class="card-footer">
      <span class="days-left${urgent?' urgent':''}">
        ${urgent?'⚠️ ':''}Осталось ${plurDays(remaining)}
      </span>
      <span>🔄 ${fmtDate(renewal)}</span>
    </div>
    <div class="confirm-overlay">
      <p class="confirm-text">Удалить «${sub.service_name}»?</p>
      <div class="confirm-btns">
        <button class="btn btn-cancel">Отмена</button>
        <button class="btn btn-confirm">Удалить</button>
      </div>
    </div>
  `;

  // Edit
  card.querySelector('.edit-btn').addEventListener('click', () => openEdit(sub, card));

  // Delete
  const overlay    = card.querySelector('.confirm-overlay');
  const cancelBtn  = card.querySelector('.btn-cancel');
  const confirmBtn = card.querySelector('.btn-confirm');
  card.querySelector('.del-btn').addEventListener('click', () => overlay.classList.add('show'));
  cancelBtn.addEventListener('click', () => overlay.classList.remove('show'));
  confirmBtn.addEventListener('click', async () => {
    confirmBtn.disabled = true; confirmBtn.textContent = '...';
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/subscriptions?id=eq.${sub.id}`, { method:'DELETE', headers:HDR });
      card.classList.add('removing');
      setTimeout(() => { card.remove(); updateBadge(); checkEmpty(); }, 280);
    } catch {
      confirmBtn.textContent = 'Ошибка';
      setTimeout(() => { confirmBtn.textContent='Удалить'; confirmBtn.disabled=false; overlay.classList.remove('show'); }, 1500);
    }
  });

  return card;
}

function updateBadge() {
  const n = document.querySelectorAll('.card:not(.removing)').length;
  const b = document.getElementById('badge');
  if (!n) { b.classList.add('hidden'); return; }
  b.textContent = `${n} ${n===1?'подписка':n<5?'подписки':'подписок'}`;
  b.classList.remove('hidden');
}
function checkEmpty() {
  if (!document.querySelectorAll('.card:not(.removing)').length) {
    document.getElementById('list').classList.add('hidden');
    document.getElementById('empty').classList.remove('hidden');
  }
}
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

async function load() {
  ['empty','error','list'].forEach(hide); show('loading');
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    let url = `${SUPABASE_URL}/rest/v1/subscriptions?select=*&order=created_at.asc`;
    if (userId) url += `&user_id=eq.${userId}`;
    const res = await fetch(url, { headers: HDR });
    if (!res.ok) throw new Error(`Supabase: HTTP ${res.status}`);
    const subs = await res.json();
    hide('loading');
    if (!subs.length) { show('empty'); return; }

    subs.sort((a,b) => {
      const ra = calcStatus(a.start_date, a.billing_period_days||30).remaining;
      const rb = calcStatus(b.start_date, b.billing_period_days||30).remaining;
      return ra - rb;
    });

    const list = document.getElementById('list');
    list.innerHTML = '';
    subs.forEach(s => list.appendChild(buildCard(s)));
    show('list');

    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.querySelectorAll('.progress-fill').forEach(el => {
        el.style.width = el.dataset.w + '%';
      });
    }));
    updateBadge();
  } catch(e) {
    hide('loading');
    document.getElementById('errorMsg').textContent = e.message;
    show('error');
  } finally {
    btn.classList.remove('spinning');
  }
}

document.getElementById('refreshBtn').addEventListener('click', load);
load();
</script>
</body>
</html>
