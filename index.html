<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Мои подписки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:        #0d0d13;
      --card:      #16161f;
      --card2:     #1c1c28;
      --text:      #ffffff;
      --hint:      rgba(255,255,255,0.42);
      --border:    rgba(255,255,255,0.07);
      --accent:    #6c6ef7;

      --ok-a: #00d68f; --ok-b: #00a876;
      --warn-a: #ffb347; --warn-b: #ff8c00;
      --red-a: #ff4f6d; --red-b: #ff1744;

      --bar-h: 14px;
      --r: 20px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 40px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top accent line ── */
    .top-line {
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #a855f7, #ec4899);
    }

    /* ── Header ── */
    .header {
      padding: 18px 20px 16px;
      background: var(--bg);
      position: sticky; top: 0; z-index: 20;
      border-bottom: 1px solid var(--border);
    }
    .header-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 {
      font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
    }
    .refresh-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.06); border: none;
      color: var(--hint); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .refresh-btn:active { background: rgba(255,255,255,0.12); }
    .refresh-btn.spinning { animation: spin 0.7s linear infinite; }

    .header-sub {
      margin-top: 6px;
      display: flex; align-items: baseline; gap: 6px;
    }
    .total-amount {
      font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--ok-a), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .total-label {
      font-size: 14px; color: var(--hint);
    }

    /* ── States ── */
    .state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 32px; gap: 12px; text-align: center;
    }
    .state-icon  { font-size: 60px; }
    .state-title { font-size: 19px; font-weight: 700; }
    .state-hint  { font-size: 14px; color: var(--hint); line-height: 1.6; }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    /* ── List ── */
    .list { padding: 16px 16px 0; display: flex; flex-direction: column; gap: 14px; }

    /* ── Card ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: linear-gradient(145deg, var(--card2), var(--card));
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      position: relative; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
      transition: transform 0.25s ease, opacity 0.25s ease, box-shadow 0.25s;
    }
    .card.urgent {
      border-color: rgba(255,79,109,0.35);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,79,109,0.15) inset,
                  0 8px 32px rgba(255,79,109,0.12);
    }
    .card.removing {
      transform: translateX(-110%); opacity: 0;
      pointer-events: none; margin-bottom: -100px;
    }

    /* Card top */
    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px; margin-bottom: 18px;
    }
    .card-info { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1; }

    .svc-icon {
      width: 50px; height: 50px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; flex-shrink: 0;
      transition: background 0.3s;
    }
    .svc-icon.ok     { background: rgba(0,214,143,0.14); }
    .svc-icon.warn   { background: rgba(255,179,71,0.14); }
    .svc-icon.danger { background: rgba(255,79,109,0.18); }

    .svc-meta { min-width: 0; }
    .svc-name {
      font-size: 17px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -0.2px;
    }
    .svc-cost { font-size: 13px; color: var(--hint); margin-top: 3px; }

    .card-actions { display: flex; gap: 7px; flex-shrink: 0; padding-top: 2px; }
    .icon-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: none; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    .icon-btn:active { transform: scale(0.85); }
    .edit-btn { background: rgba(108,110,247,0.16); color: rgba(108,110,247,0.9); }
    .edit-btn:hover { background: rgba(108,110,247,0.28); }
    .del-btn  { background: rgba(255,79,109,0.12); color: rgba(255,79,109,0.75); }
    .del-btn:hover  { background: rgba(255,79,109,0.24); color: var(--red-a); }

    /* ── Progress bar ── */
    .progress-wrap { margin: 0 0 14px; }
    .progress-track {
      height: var(--bar-h);
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      overflow: visible;
      position: relative;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      width: 0; min-width: 0;
      transition: width 1s cubic-bezier(0.4,0,0.2,1);
      position: relative; z-index: 1;
    }
    .progress-fill.ok {
      background: linear-gradient(90deg, var(--ok-a), var(--ok-b));
      box-shadow: 0 0 14px rgba(0,214,143,0.55), 0 2px 6px rgba(0,214,143,0.35);
    }
    .progress-fill.warn {
      background: linear-gradient(90deg, var(--warn-a), var(--warn-b));
      box-shadow: 0 0 14px rgba(255,179,71,0.55), 0 2px 6px rgba(255,179,71,0.35);
    }
    .progress-fill.danger {
      background: linear-gradient(90deg, var(--red-a), var(--red-b));
      animation: redGlow 1.6s ease-in-out infinite;
    }
    @keyframes redGlow {
      0%,100% { box-shadow: 0 0 14px rgba(255,79,109,0.55), 0 2px 6px rgba(255,79,109,0.3); }
      50%      { box-shadow: 0 0 28px rgba(255,79,109,0.85), 0 2px 12px rgba(255,79,109,0.5); }
    }

    .progress-labels {
      display: flex; justify-content: space-between;
      margin-top: 8px; font-size: 11px; color: var(--hint);
    }

    /* ── Card footer ── */
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .days-badge {
      display: flex; align-items: baseline; gap: 4px;
    }
    .days-num {
      font-size: 28px; font-weight: 800; letter-spacing: -1px; line-height: 1;
    }
    .days-num.ok     { color: var(--ok-a); }
    .days-num.warn   { color: var(--warn-a); }
    .days-num.danger { color: var(--red-a); }
    .days-word { font-size: 13px; color: var(--hint); }

    .renewal-info { text-align: right; }
    .renewal-label { font-size: 11px; color: var(--hint); margin-bottom: 2px; }
    .renewal-date  { font-size: 14px; font-weight: 600; }

    /* ── Delete overlay ── */
    .confirm-overlay {
      position: absolute; inset: 0; background: rgba(13,13,19,0.95);
      border-radius: var(--r); backdrop-filter: blur(8px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .confirm-overlay.show { opacity: 1; pointer-events: all; }
    .confirm-text { font-size: 16px; font-weight: 600; text-align: center; }
    .confirm-btns { display: flex; gap: 10px; width: 100%; }
    .btn {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active   { opacity: .75; transform: scale(.97); }
    .btn:disabled { opacity: .45; pointer-events: none; }
    .btn-cancel  { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-confirm { background: linear-gradient(135deg, var(--red-a), var(--red-b)); color: #fff; }
    .btn-save    { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; }

    /* ── Edit bottom sheet ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: all; }

    .modal-sheet {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
      background: #1a1a26;
      border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(255,255,255,0.09);
      padding: 14px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    }
    .modal-sheet.show { transform: translateY(0); }

    .modal-handle {
      width: 40px; height: 4px; border-radius: 99px;
      background: rgba(255,255,255,0.18);
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 18px; font-weight: 800; text-align: center;
      margin-bottom: 22px; letter-spacing: -0.3px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--hint); margin-bottom: 7px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .field input, .field select {
      width: 100%; padding: 13px 15px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; color: var(--text);
      font-size: 15px; font-family: inherit; outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--accent);
      background: rgba(108,110,247,0.07);
    }
    .field select option { background: #1a1a26; }
    .field-row { display: flex; gap: 10px; }
    .field-row .field { flex: 1; margin-bottom: 0; }
    .field-row-wrap { display: flex; gap: 10px; margin-bottom: 14px; }
    .field-row-wrap .field { flex: 1; margin-bottom: 0; }

    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
  </style>
</head>
<body>

<div class="top-line"></div>

<div class="header">
  <div class="header-row">
    <h1>📋 Мои подписки</h1>
    <button id="refreshBtn" class="refresh-btn">↻</button>
  </div>
  <div class="header-sub hidden" id="headerSub">
    <span class="total-amount" id="totalAmount"></span>
    <span class="total-label" id="totalLabel"></span>
  </div>
</div>

<div id="loading" class="state">
  <div class="spinner"></div>
  <p class="state-hint">Загружаю подписки...</p>
</div>
<div id="empty" class="state hidden">
  <div class="state-icon">📭</div>
  <p class="state-title">Подписок пока нет</p>
  <p class="state-hint">Напишите боту название сервиса,<br>стоимость и дату оформления</p>
</div>
<div id="error" class="state hidden">
  <div class="state-icon">⚠️</div>
  <p class="state-title">Ошибка загрузки</p>
  <p id="errorMsg" class="state-hint"></p>
</div>
<div id="list" class="list hidden"></div>

<!-- Edit sheet -->
<div id="modalBackdrop" class="modal-backdrop"></div>
<div id="modalSheet" class="modal-sheet">
  <div class="modal-handle"></div>
  <div class="modal-title">Редактировать подписку</div>
  <div class="field">
    <label>Название</label>
    <input id="editName" type="text" placeholder="Spotify" autocomplete="off" />
  </div>
  <div class="field-row-wrap">
    <div class="field">
      <label>Стоимость</label>
      <input id="editCost" type="number" inputmode="decimal" placeholder="299" />
    </div>
    <div class="field">
      <label>Валюта</label>
      <select id="editCurrency">
        <option value="RUB">₽ RUB</option>
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
      </select>
    </div>
  </div>
  <div class="field">
    <label>Дата начала</label>
    <input id="editDate" type="date" />
  </div>
  <div class="field">
    <label>Период</label>
    <select id="editPeriod">
      <option value="30">Ежемесячно (30 дн.)</option>
      <option value="90">Каждые 3 месяца</option>
      <option value="180">Каждые 6 месяцев</option>
      <option value="365">Ежегодно (365 дн.)</option>
    </select>
  </div>
  <div class="modal-actions">
    <button class="btn btn-cancel" id="editCancel">Отмена</button>
    <button class="btn btn-save"   id="editSave">Сохранить</button>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://gzsbodvyalwvfmzgwggf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6c2JvZHZ5YWx3dmZtemd3Z2dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjM4MzcsImV4cCI6MjA5MzM5OTgzN30.7dSJEQpWh2S1muvaAs2mFS70SARnuG4sE8ucsfNGpM0';

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const userId = tg?.initDataUnsafe?.user?.id ?? null;

const HDR = {
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
  'Content-Type': 'application/json',
};

const EMOJI = {
  spotify:'🎵',netflix:'🎬',youtube:'▶️',amazon:'📦',apple:'🍎',
  icloud:'☁️',adobe:'🎨',figma:'✏️',яндекс:'🟡',yandex:'🟡',vk:'💙',
  telegram:'✈️',github:'💻',notion:'📝',slack:'💬',zoom:'📹',
  discord:'🎮',chatgpt:'🤖',openai:'🤖',claude:'🧠',midjourney:'🖼️',
  google:'🔍',dropbox:'📦',canva:'🎨',office:'📊',microsoft:'💼',
  vps:'🖥️',ufo:'🖥️',сервер:'🖥️',server:'🖥️',
  linkedin:'💼',twitter:'🐦',instagram:'📸',tiktok:'🎶',
};
const getEmoji = n => Object.entries(EMOJI).find(([k]) => n.toLowerCase().includes(k))?.[1] ?? '💳';

function calcStatus(startDate, period) {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(startDate + 'T00:00:00'); start.setHours(0,0,0,0);
  const daysSince = Math.floor((today - start) / 86400000);
  if (daysSince < 0) return { elapsed:0, remaining:period, progress:0, renewal:start };
  const elapsed   = daysSince % period;
  const remaining = period - elapsed;
  const renewal   = new Date(today); renewal.setDate(today.getDate() + remaining);
  return { elapsed, remaining, progress: elapsed / period * 100, renewal };
}

const colorCls = r => r <= 5 ? 'danger' : r <= 10 ? 'warn' : 'ok';
const fmtCost  = (c, cur) => `${Number(c).toLocaleString('ru-RU')} ${{RUB:'₽',USD:'$',EUR:'€'}[cur]??cur}`;
const fmtPer   = d => d >= 360 ? '/год' : d >= 28 ? '/мес' : `/${d}дн.`;
const fmtDate  = d => d.toLocaleDateString('ru-RU', { day:'numeric', month:'short' });

const plurDays = n => {
  const m=n%10, h=n%100;
  if (h>=11&&h<=19) return 'дней';
  if (m===1) return 'день';
  if (m>=2&&m<=4) return 'дня';
  return 'дней';
};

// ── Edit modal ───────────────────────────────────────────────
let _editId = null;

function openEdit(sub) {
  _editId = sub.id;
  document.getElementById('editName').value     = sub.service_name;
  document.getElementById('editCost').value     = sub.cost;
  document.getElementById('editCurrency').value = sub.currency || 'RUB';
  document.getElementById('editDate').value     = sub.start_date;
  document.getElementById('editPeriod').value   = String(sub.billing_period_days || 30);
  document.getElementById('modalBackdrop').classList.add('show');
  document.getElementById('modalSheet').classList.add('show');
  setTimeout(() => document.getElementById('editName').focus(), 300);
}
function closeEdit() {
  document.getElementById('modalBackdrop').classList.remove('show');
  document.getElementById('modalSheet').classList.remove('show');
  _editId = null;
}

document.getElementById('editCancel').addEventListener('click', closeEdit);
document.getElementById('modalBackdrop').addEventListener('click', closeEdit);

document.getElementById('editSave').addEventListener('click', async () => {
  if (!_editId) return;
  const btn = document.getElementById('editSave');
  btn.disabled = true; btn.textContent = '...';
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/subscriptions?id=eq.${_editId}`, {
      method: 'PATCH',
      headers: { ...HDR, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        service_name:        document.getElementById('editName').value.trim(),
        cost:                parseFloat(document.getElementById('editCost').value),
        currency:            document.getElementById('editCurrency').value,
        start_date:          document.getElementById('editDate').value,
        billing_period_days: parseInt(document.getElementById('editPeriod').value),
      }),
    });
    if (!r.ok) throw new Error();
    closeEdit();
    await load();
  } catch {
    btn.textContent = 'Ошибка';
    setTimeout(() => { btn.disabled=false; btn.textContent='Сохранить'; }, 1500);
  }
});

// ── Card builder ─────────────────────────────────────────────
function buildCard(sub, index) {
  const period = sub.billing_period_days || 30;
  const { elapsed, remaining, progress, renewal } = calcStatus(sub.start_date, period);
  const cls    = colorCls(remaining);
  const urgent = cls === 'danger';

  const card = document.createElement('div');
  card.className = `card${urgent ? ' urgent' : ''}`;
  card.style.animationDelay = `${index * 60}ms`;
  card.dataset.id = sub.id;

  card.innerHTML = `
    <div class="card-top">
      <div class="card-info">
        <div class="svc-icon ${cls}">${getEmoji(sub.service_name)}</div>
        <div class="svc-meta">
          <div class="svc-name">${sub.service_name}</div>
          <div class="svc-cost">${fmtCost(sub.cost, sub.currency||'RUB')}${fmtPer(period)}</div>
        </div>
      </div>
      <div class="card-actions">
        <button class="icon-btn edit-btn" title="Редактировать">✏️</button>
        <button class="icon-btn del-btn"  title="Удалить">✕</button>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill ${cls}" data-w="${Math.min(progress,100).toFixed(2)}"></div>
      </div>
      <div class="progress-labels">
        <span>${elapsed} дн. прошло</span>
        <span>${period} дн. цикл</span>
      </div>
    </div>

    <div class="card-footer">
      <div class="days-badge">
        <span class="days-num ${cls}">${remaining}</span>
        <span class="days-word">${plurDays(remaining)}<br>осталось</span>
      </div>
      <div class="renewal-info">
        <div class="renewal-label">🔄 продление</div>
        <div class="renewal-date">${fmtDate(renewal)}</div>
      </div>
    </div>

    <div class="confirm-overlay">
      <p class="confirm-text">Удалить «${sub.service_name}»?</p>
      <div class="confirm-btns">
        <button class="btn btn-cancel">Отмена</button>
        <button class="btn btn-confirm">Удалить</button>
      </div>
    </div>
  `;

  card.querySelector('.edit-btn').addEventListener('click', () => openEdit(sub));

  const overlay    = card.querySelector('.confirm-overlay');
  const confirmBtn = card.querySelector('.btn-confirm');
  card.querySelector('.del-btn').addEventListener('click', () => overlay.classList.add('show'));
  card.querySelector('.btn-cancel').addEventListener('click', () => overlay.classList.remove('show'));
  confirmBtn.addEventListener('click', async () => {
    confirmBtn.disabled = true; confirmBtn.textContent = '...';
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/subscriptions?id=eq.${sub.id}`, { method:'DELETE', headers:HDR });
      card.classList.add('removing');
      setTimeout(() => { card.remove(); refreshHeader(); checkEmpty(); }, 280);
    } catch {
      confirmBtn.textContent = 'Ошибка';
      setTimeout(() => { confirmBtn.textContent='Удалить'; confirmBtn.disabled=false; overlay.classList.remove('show'); }, 1500);
    }
  });

  return card;
}

function refreshHeader() {
  const cards = [...document.querySelectorAll('.card:not(.removing)')];
  const sub   = document.getElementById('headerSub');
  if (!cards.length) { sub.classList.add('hidden'); return; }

  // Sum monthly equivalent in RUB
  let totalRub = 0, hasOther = false;
  cards.forEach(c => {
    const id = c.dataset.id;
    const s  = _allSubs.find(x => x.id === id);
    if (!s) return;
    const cur = s.currency || 'RUB';
    if (cur === 'RUB') totalRub += s.cost * (30 / (s.billing_period_days || 30));
    else hasOther = true;
  });

  document.getElementById('totalAmount').textContent =
    totalRub.toLocaleString('ru-RU', { maximumFractionDigits: 0 }) + ' ₽';
  document.getElementById('totalLabel').textContent =
    `в месяц · ${cards.length} ${cards.length===1?'подписка':cards.length<5?'подписки':'подписок'}${hasOther?'+':''}`;
  sub.classList.remove('hidden');
}

function checkEmpty() {
  if (!document.querySelectorAll('.card:not(.removing)').length) {
    document.getElementById('list').classList.add('hidden');
    document.getElementById('empty').classList.remove('hidden');
    document.getElementById('headerSub').classList.add('hidden');
  }
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

let _allSubs = [];

async function load() {
  ['empty','error','list'].forEach(hide); show('loading');
  document.getElementById('refreshBtn').classList.add('spinning');
  try {
    let url = `${SUPABASE_URL}/rest/v1/subscriptions?select=*&order=created_at.asc`;
    if (userId) url += `&user_id=eq.${userId}`;
    const res = await fetch(url, { headers: HDR });
    if (!res.ok) throw new Error(`Supabase: HTTP ${res.status}`);
    _allSubs = await res.json();
    hide('loading');

    if (!_allSubs.length) { show('empty'); return; }

    _allSubs.sort((a, b) => {
      const ra = calcStatus(a.start_date, a.billing_period_days||30).remaining;
      const rb = calcStatus(b.start_date, b.billing_period_days||30).remaining;
      return ra - rb;
    });

    const list = document.getElementById('list');
    list.innerHTML = '';
    _allSubs.forEach((s, i) => list.appendChild(buildCard(s, i)));
    show('list');

    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.querySelectorAll('.progress-fill').forEach(el => {
        el.style.width = el.dataset.w + '%';
      });
    }));

    refreshHeader();
  } catch(e) {
    hide('loading');
    document.getElementById('errorMsg').textContent = e.message;
    show('error');
  } finally {
    document.getElementById('refreshBtn').classList.remove('spinning');
  }
}

document.getElementById('refreshBtn').addEventListener('click', load);
load();
</script>
</body>
</html>
